name: matcha
base: core22
adopt-info: matcha
summary: A beautiful and functional email client for your terminal.
description: |
  A beautiful and functional email client for your terminal, built with Go and the charming Bubble Tea TUI library.
  Never leave your command line to check your inbox or send an email again!

grade: stable
confinement: strict
architectures:
  - build-on: [amd64]
    build-for: [amd64]
  - build-on: [arm64]
    build-for: [arm64]

apps:
  matcha:
    command: bin/matcha
    plugs:
      - network
      - home

parts:
  matcha:
    plugin: nil
    source: .
    build-snaps:
      - go/1.26/stable
    build-packages:
      - gcc
      - libc6-dev
      - libpcsclite-dev
      - pkg-config
    build-environment:
      - CGO_ENABLED: "1"
      - GOBIN: ""
    override-pull: |
      craftctl default
      if [ -f .nightly ]; then
        version="nightlyv0"
      else
        version="$(git describe --tags --abbrev=0 --exclude='nightlyv*' 2>/dev/null | sed 's/^v//' || echo 0.1)"
      fi
      craftctl set version="$version"
    override-build: |
      go build -o "${CRAFT_PART_INSTALL}/bin/matcha" .
